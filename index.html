<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArquivoMan: Runner 32-bit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="startScreen" class="overlay">
        <h1>🗂️ ARQUIVOMAN</h1>
        <p>O setor está um caos! Organize os processos antes que os gaveteiros te cerquem.</p>
        <button onclick="startGame()">▶ INICIAR EXPEDIENTE</button>
    </div>

    <div id="gameUI" style="display: none;">
        <div id="hud">
            <div class="stat">PONTOS: <span id="score">0</span></div>
            <div class="stat">VIDAS: <span id="lives">3</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
