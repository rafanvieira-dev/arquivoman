<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ArquivoMan - Runner 32bit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="startScreen" class="screen">
        <h1>🗂️ ArquivoMan: Runner</h1>
        <p>Desvie dos gaveteiros e organize os processos!</p>
        <p><small>Use as SETAS ESQUERDA e DIREITA para mudar de pista</small></p>
        <button onclick="startGame()">▶ Iniciar Expediente</button>
    </div>

    <div id="gameUI" style="display:none;">
        <div id="hud">
            <span>Pontos: <span id="score">0</span></span>
            <span>Vidas: <span id="lives">3</span></span>
            <span id="powerTimer" style="color: #00ff41; margin-left: 15px;"></span>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
